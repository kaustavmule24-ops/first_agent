<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoBot — Location Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
    --primary: #6366f1;
    --primary-glow: rgba(99, 102, 241, 0.4);
    --secondary: #8b5cf6;
    --accent: #06b6d4;
    --bg-dark: #0f172a;
    --bg-card: rgba(30, 41, 59, 0.6);
    --bg-glass: rgba(255, 255, 255, 0.03);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --border: rgba(255, 255, 255, 0.08);
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
    --info: #3b82f6;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

/* Animated background mesh */
.bg-mesh {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: 
        radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
    animation: meshMove 20s ease-in-out infinite;
}

@keyframes meshMove {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
}

/* Floating particles */
.particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--primary);
    border-radius: 50%;
    opacity: 0.3;
    animation: float 15s infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.3; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
}

.app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    height: 95vh;
    max-height: 900px;
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
}

/* Header */
.header {
    padding: 20px 20px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
}

.header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(99, 102, 241, 0.15);
    border: 1px solid rgba(99, 102, 241, 0.3);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.header-badge:hover {
    background: rgba(99, 102, 241, 0.25);
}

.header-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--success);
    border-radius: 50%;
    animation: livePulse 2s infinite;
}

.header-badge.offline::before {
    background: var(--error);
    animation: none;
}

@keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
}

.header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
}

.header-sub {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
}

/* Orb */
.orb-container {
    display: flex;
    justify-content: center;
    padding: 6px 0 2px;
}

.orb {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--primary), var(--secondary), var(--accent), var(--primary));
    position: relative;
    animation: orbSpin 8s linear infinite;
    box-shadow: 0 0 40px var(--primary-glow);
}

.orb::before {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--bg-dark);
    z-index: 1;
}

.orb::after {
    content: '🌍';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    z-index: 2;
    animation: orbSpin 8s linear infinite reverse;
}

@keyframes orbSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Chat area */
.chat {
    flex: 1;
    padding: 16px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
}

.chat::-webkit-scrollbar {
    width: 4px;
}

.chat::-webkit-scrollbar-track {
    background: transparent;
}

.chat::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
}

/* Messages */
.msg {
    padding: 14px 18px;
    border-radius: 18px;
    max-width: 85%;
    font-size: 14px;
    line-height: 1.6;
    animation: msgSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    word-wrap: break-word;
}

@keyframes msgSlide {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.msg.user {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
}

.msg.bot {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    margin-right: auto;
    border-bottom-left-radius: 4px;
}

.msg.bot.info-card {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
    border: 1px solid rgba(99, 102, 241, 0.2);
    padding: 20px;
    max-width: 95%;
}

.msg-time {
    font-size: 10px;
    opacity: 0.5;
    margin-top: 6px;
    text-align: right;
}

/* Typing indicator */
.typing-container {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    margin-right: auto;
    max-width: 100px;
}

.typing-container.active {
    display: flex;
}

.typing-dot {
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
    animation: typingBounce 1.4s infinite ease-in-out both;
}

.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }

@keyframes typingBounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
}

/* Suggestions */
.suggestions-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 4px 0;
}

.chip {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
    user-select: none;
}

.chip:hover {
    background: rgba(99, 102, 241, 0.15);
    border-color: var(--primary);
    color: var(--text-primary);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
}

.chip:active {
    transform: scale(0.95);
}

/* Input area */
.input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: rgba(15, 23, 42, 0.8);
}

.input-box {
    display: flex;
    gap: 10px;
    align-items: center;
}

.input-wrapper {
    flex: 1;
    position: relative;
}

.input-wrapper input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: all 0.3s ease;
}

.input-wrapper input::placeholder {
    color: var(--text-secondary);
}

.input-wrapper input:focus {
    border-color: var(--primary);
    background: rgba(99, 102, 241, 0.05);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.input-wrapper input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.send-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
}

.send-btn:hover:not(:disabled) {
    transform: scale(1.05) rotate(-5deg);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
}

.send-btn:active:not(:disabled) {
    transform: scale(0.95);
}

.send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.send-btn svg {
    width: 20px;
    height: 20px;
    margin-left: 2px;
}

.input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 10px;
    opacity: 0.7;
}

/* Location card styling */
.location-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
}

.location-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

.location-title {
    font-size: 16px;
    font-weight: 700;
}

.location-subtitle {
    font-size: 12px;
    color: var(--text-secondary);
}

.data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
}

.data-item {
    background: rgba(255,255,255,0.03);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
}

.data-item:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(99, 102, 241, 0.3);
}

.data-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}

.data-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
}

.data-value.good { color: var(--success); }
.data-value.moderate { color: var(--warning); }
.data-value.bad { color: var(--error); }

/* Comparison card */
.compare-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-top: 8px;
}

.compare-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
}

.compare-row:last-child {
    border-bottom: none;
}

.compare-city {
    font-weight: 600;
    font-size: 14px;
}

.compare-bar {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    margin: 0 12px;
    overflow: hidden;
}

.compare-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
}

.compare-value {
    font-size: 13px;
    font-weight: 600;
    min-width: 40px;
    text-align: right;
}

/* Error state */
.error-shake {
    animation: shake 0.5s ease-in-out;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
}

/* Toast notification */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    color: var(--text-primary);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.toast.show {
    transform: translateX(-50%) translateY(0);
}

.toast-icon {
    font-size: 16px;
}

/* Clear chat button */
.clear-btn {
    position: absolute;
    top: 20px;
    right: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 4px;
}

.clear-btn:hover {
    background: rgba(239, 68, 68, 0.1);
    border-color: var(--error);
    color: var(--error);
}

/* Responsive */
@media (max-width: 520px) {
    .app {
        height: 100vh;
        max-height: none;
        border-radius: 0;
        border: none;
    }
    
    body {
        padding: 0;
    }
    
    .bg-mesh, .particles {
        display: none;
    }
    
    .clear-btn {
        top: 12px;
        right: 12px;
    }
}
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="particles" id="particles"></div>

<div class="app">
    <div class="header">
        <div class="header-badge" id="statusBadge" onclick="checkConnection()">MCP Connected</div>
        <h1>GeoBot</h1>
        <div class="header-sub">Location Intelligence Assistant</div>
        <button class="clear-btn" onclick="clearChat()" title="Clear conversation">🗑️ Clear</button>
    </div>

    <div class="orb-container">
        <div class="orb"></div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="typing-container" id="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <div class="input-wrapper">
                <input id="msg" placeholder="Enter a city name (e.g., Tokyo, Paris)..." autocomplete="off" />
            </div>
            <button class="send-btn" onclick="send()" id="sendBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22,2 15,22 11,13 2,9 22,2"></polygon>
                </svg>
            </button>
        </div>
        <div class="input-hint" id="inputHint">Connected to your MCP server for real-time data</div>
    </div>
</div>

<div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon">ℹ️</span>
    <span id="toastText">Notification</span>
</div>

<script>
// Create floating particles
function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 15 + 's';
        p.style.animationDuration = (10 + Math.random() * 10) + 's';
        container.appendChild(p);
    }
}
createParticles();

// Toast notification system
function showToast(text, icon = 'ℹ️', duration = 3000) {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = text;
    document.getElementById('toastIcon').textContent = icon;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), duration);
}

// Connection status check
let isConnected = true;
async function checkConnection() {
    try {
        const res = await fetch('/chat', { method: 'HEAD' });
        isConnected = res.ok;
        updateStatus(true);
        showToast('MCP server is online', '✅');
    } catch (err) {
        isConnected = false;
        updateStatus(false);
        showToast('MCP server is offline', '❌');
    }
}

function updateStatus(online) {
    const badge = document.getElementById('statusBadge');
    if (online) {
        badge.classList.remove('offline');
        badge.textContent = 'MCP Connected';
        document.getElementById('inputHint').textContent = 'Connected to your MCP server for real-time data';
    } else {
        badge.classList.add('offline');
        badge.textContent = 'MCP Offline';
        document.getElementById('inputHint').textContent = 'Server offline — responses may be limited';
    }
}

// Clear chat
function clearChat() {
    const chat = document.getElementById('chat');
    chat.innerHTML = '';
    showToast('Conversation cleared', '🗑️');
    window.onload();
}

function addMsg(text, type, isCard = false) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "msg " + type + (isCard ? " info-card" : "");
    
    const time = new Date().toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: true 
    });
    
    if (isCard) {
        div.innerHTML = text;
    } else {
        div.innerHTML = text + `<div class="msg-time">${time}</div>`;
    }
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

function addSuggestions(options) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "suggestions-row";
    
    options.forEach(opt => {
        let chip = document.createElement("span");
        chip.className = "chip";
        chip.innerHTML = opt.icon ? `${opt.icon} ${opt.text}` : opt.text;
        chip.onclick = () => {
            document.getElementById("msg").value = opt.text;
            send();
        };
        div.appendChild(chip);
    });
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    document.getElementById('typing').classList.add('active');
    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function hideTyping() {
    document.getElementById('typing').classList.remove('active');
}

function setInputEnabled(enabled) {
    const input = document.getElementById('msg');
    const btn = document.getElementById('sendBtn');
    input.disabled = !enabled;
    btn.disabled = !enabled;
}

window.onload = () => {
    addMsg("👋 Welcome to GeoBot! I can provide weather, air quality, and location insights for any city worldwide.", "bot");
    addSuggestions([
        { text: "Kolkata", icon: "🇮🇳" },
        { text: "Tokyo", icon: "🇯🇵" },
        { text: "New York", icon: "🇺🇸" },
        { text: "London", icon: "🇬🇧" },
        { text: "Compare", icon: "⚖️" }
    ]);
    checkConnection();
};

async function send() {
    let input = document.getElementById("msg");
    let text = input.value.trim();
    input.value = "";
    
    if (!text) return;
    
    setInputEnabled(false);
    addMsg(text, "user");
    showTyping();
    
    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text})
        });
        
        if (!res.ok) throw new Error('Server error');
        
        let data = await res.json();
        hideTyping();
        
        if (data.response && typeof data.response === 'object') {
            if (data.response.compare) {
                renderCompareCard(data.response);
            } else {
                renderLocationCard(data.response);
            }
        } else {
            addMsg(data.response || "No data available", "bot");
        }
        
        if (!data.response?.compare) {
            addMsg("🌍 Explore another location or compare cities!", "bot");
            addSuggestions([
                { text: "Kolkata", icon: "🇮🇳" },
                { text: "Delhi", icon: "🇮🇳" },
                { text: "Mumbai", icon: "🇮🇳" },
                { text: "Compare", icon: "⚖️" }
            ]);
        }
        
        updateStatus(true);
        
    } catch (err) {
        hideTyping();
        let errorDiv = addMsg("⚠️ Connection failed. MCP server may be offline.", "bot");
        errorDiv.classList.add('error-shake');
        updateStatus(false);
        setInputEnabled(true);
    }
}

function renderLocationCard(data) {
    const aqiColor = data.aqi <= 50 ? 'good' : data.aqi <= 100 ? 'moderate' : 'bad';
    const aqiLabel = data.aqi <= 50 ? 'Good' : data.aqi <= 100 ? 'Moderate' : 'Unhealthy';
    
    const cardHTML = `
        <div class="location-header">
            <div class="location-icon">📍</div>
            <div>
                <div class="location-title">${data.city || 'Unknown'}</div>
                <div class="location-subtitle">${data.country || ''}</div>
            </div>
        </div>
        <div class="data-grid">
            <div class="data-item">
                <div class="data-label">Temperature</div>
                <div class="data-value">${data.temp || '--'}°C</div>
            </div>
            <div class="data-item">
                <div class="data-label">Condition</div>
                <div class="data-value" style="font-size:14px">${data.condition || '--'}</div>
            </div>
            <div class="data-item">
                <div class="data-label">Air Quality</div>
                <div class="data-value ${aqiColor}">${data.aqi || '--'}</div>
            </div>
            <div class="data-item">
                <div class="data-label">AQI Status</div>
                <div class="data-value ${aqiColor}" style="font-size:14px">${aqiLabel}</div>
            </div>
        </div>
        <div class="msg-time" style="margin-top:12px;text-align:right">${new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:true})}</div>
    `;
    
    addMsg(cardHTML, "bot", true);
}

function renderCompareCard(data) {
    const cities = data.cities || [];
    const metric = data.metric || 'AQI';
    
    let compareHTML = `
        <div class="location-header">
            <div class="location-icon">⚖️</div>
            <div>
                <div class="location-title">City Comparison</div>
                <div class="location-subtitle">Comparing ${metric} across locations</div>
            </div>
        </div>
    `;
    
    const maxVal = Math.max(...cities.map(c => c.value));
    
    cities.forEach(city => {
        const percentage = (city.value / maxVal) * 100;
        const color = city.value <= 50 ? 'var(--success)' : city.value <= 100 ? 'var(--warning)' : 'var(--error)';
        
        compareHTML += `
            <div class="compare-row">
                <div class="compare-city">${city.name}</div>
                <div class="compare-bar">
                    <div class="compare-fill" style="width: ${percentage}%; background: ${color}"></div>
                </div>
                <div class="compare-value" style="color: ${color}">${city.value}</div>
            </div>
        `;
    });
    
    compareHTML += `<div class="msg-time" style="margin-top:12px;text-align:right">${new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:true})}</div>`;
    
    addMsg(compareHTML, "bot", true);
    setInputEnabled(true);
}

document.getElementById("msg").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        send();
    }
});
</script>

</body>
</html>
